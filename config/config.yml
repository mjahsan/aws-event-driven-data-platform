project:
    name: 
        aws-event-driven-data-platform
    environment: 
        dev
  
s3:
    bucket: 
        event-platform-new
    layers:
        raw: 
            raw/
        validated:
            validated/user_events
            validated/payment_events
            validated/order_events
        rejected:
            rejected/
        silver:
            user_events/
            payment_events/
            order_events/
            
ingestion:
    Allowed_extension: 
        json
    data_generator_for_ingestion:
        script:
            data_generator/generate_events.py
        schemas:
            data_generator/schemas
                - event_envelope_schema.json
                - file_container_schema.json
                - order_payload_schema.json
                - payment_payload_schema.json
                - user_payload_schema.json
            
iam:
    lambda_roles:
        role_name:
            - event-platform-lambda_role
            - lambda-secrets-manager-role
        policy_script:
            - infra/iam/lambda/lambda_execution_policy.json
            - infra/iam/lambda/lambda_secrets_manager_policy.json
    step_function_roles:
        role_name:
            - step_functions_for_validated_to_silver
            - step_functions_for_silver_to_gold
        policy_script:
            - infra/iam/lambda/sf_validated_to_silver_policy.json
            - infra/iam/lambda/sf_silver_to_gold_policy.json
    event_bridge_roles:
        role_name:
            - event_bridge_for_gold_to_validated_sf
            - event_bridge_for_silver_to_gold_sf
        policy_script:
            - infra/iam/lambda/eb_validated_to_silver_policy.json
            - infra/iam/lambda/eb_silver_to_gold_policy.json
    databricks_role:
        role_name:
            - databricks_aws_connection_role
        policy_script:
            - infra/iam/lambda/db_aws_connection_policy.json
            - infra/iam/lambda/db_aws_conection_trust_policy.json
            
lambda:
    raw_to_validated_or_rejected:
        function_name: 
            event_processing_function
        timeout_seconds: 
            30
        memory_mb: 
            1024
        trigger:
            sqs:
                event-platform-new
        trigger_type:
            event_source_mapping
        environment_variables:
            none
        script:
            lambda/raw_to_validated_or_rejected/
            
    validated_to_silver:
        dataricks_silver_trigger:
            function_name: 
                databricks_silver_trigger_lambda
            timeout_seconds: 
                30
            memory_mb: 
                1024
            trigger:
                none
            trigger_type:
                none
            environment_variables:
                - DATABRICKS_HOST
                - SILVER_JOB_ID
                - SECRET_NAME
            script:
                lambda/validated_to_silver/
                
        dataricks_silver_status:
            function_name: 
                databricks_silver_status_lambda
            timeout_seconds: 
                30
            memory_mb: 
                1024
            trigger:
                none
            trigger_type:
                none
            environment_variables:
                - DATABRICKS_HOST
                - SILVER_JOB_ID
                - SECRET_NAME
            script:
                lambda/validated_to_silver/
                
    silver_to_gold:
        dataricks_gold_trigger:
            function_name: 
                databricks_gold_trigger_lambda
            timeout_seconds: 
                30
            memory_mb: 
                1024
            trigger:
                none
            trigger_type:
                none
            environment_variables:
                - DATABRICKS_HOST
                - GOLD_JOB_ID
                - SECRET_NAME
            script:
                lambda/silver_to_gold/
                
        dataricks_gold_status:
            function_name: 
                databricks_silver_status_lambda
            timeout_seconds: 
                30
            memory_mb: 
                1024
            trigger:
                none
            trigger_type:
                none
            environment_variables:
                - DATABRICKS_HOST
                - GOLD_JOB_ID
                - SECRET_NAME
            script:
                lambda/silver_to_gold/
            
dynamodb:
    table_name:
        event-platform-metadata
    partition_key:
        etag
    sort_key:
        None
    capacity_mode:
        on-demand
    global_secondary_index:
        None
    local_secondary_index:
        None
        
sqs:
    main_queue_for_validation:
        queue_name: 
            event-platform-new
        visibility_timeout_seconds:
            30
        message_retention_period_days:
            4
        maximum_message_size:
            1024
        delivery_delay_seconds:
            0
        recieve_message_wait_time_seconds:
            0
        encryption:
            server-side-enncryption:
                enabled
        dead_letter_queue:
            enabled
            queue_name:
                arn:aws:sqs:<REGION>:<ACCOUNT NUMBER>:dlq-event-platform-new
            maximum_retry_count:
                3
        access_policy:
            infra/sqs/main/main_validation_access_policy.json
    
    dead_letter_queue_for_validation:
        queue_name: 
            dlq-event-platform-new
        visibility_timeout_seconds:
            30
        message_retention_period_days:
            4
        maximum_message_size:
            1024
        delivery_delay_seconds:
            0
        recieve_message_wait_time_seconds:
            0
        encryption:
            server-side-enncryption:
                enabled
        redrive_allow_policy:
            enabled
            permission:
                by_queue
            queue_name:
                arn:aws:sqs:<REGION>:<ACCOUNT NUMBER>:event-platform-new
        dead_letter_queue:
            diabled
        access_policy:
            infra/sqs/dlq/dlq_validation_access_policy.json

  
    main_queue_for_processing_silver_to_gold:
        queue_name: 
            processing-event-platform-new
        visibility_timeout_seconds:
            360
        message_retention_period_days:
            4
        maximum_message_size:
            1024
        delivery_delay_seconds:
            0
        recieve_message_wait_time_seconds:
            0
        encryption:
            server-side-enncryption:
                enabled
        dead_letter_queue:
            enabled
            queue_name:
                arn:aws:sqs:<REGION>:<ACCOUNT NUMBER>:dlq-processing-event-platform-new
            maximum_retry_count:
                3
        access_policy:
            infra/sqs/main/main_silver_to_gold_access_policy.json
    
    dead_letter_queue_for_processing_silver_to_gold:
        queue_name: 
            dlq-processing-event-platform-new
        visibility_timeout_seconds:
            30
        message_retention_period_days:
            4
        maximum_message_size:
            1024
        delivery_delay_seconds:
            0
        recieve_message_wait_time_seconds:
            0
        encryption:
            server-side-enncryption:
                enabled
        redrive_allow_policy:
            enabled
            permission:
                by_queue
            queue_name:
                arn:aws:sqs:<REGION>:<ACCOUNT NUMBER>:processing-event-platform-new
        dead_letter_queue:
            diabled
        access_policy:
            infra/sqs/dlq/dlq_silver_to_gold_access_policy.json 

step_functions:
    state_machine_name:
        ValidatedToSilverStateMachine
    graph:
        stepfunctions_graph.png
